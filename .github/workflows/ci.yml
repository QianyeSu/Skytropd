name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTEST_ARGS: >-
    testing/test_functions.py
    testing/test_metrics.py
    testing/test_xarray_metrics.py
    testing/test_import_alias.py

jobs:
  source-tests:
    name: Source tests (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest xarray

      - name: Run tests
        run: python -m pytest -q -p no:cacheprovider ${{ env.PYTEST_ARGS }}

  manylinux-tests:
    name: Manylinux tests (${{ matrix.manylinux-image }} / ${{ matrix.python-tag }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        manylinux-image: [manylinux2014, manylinux_2_28]
        python-tag: [cp39, cp310, cp311, cp312, cp313, cp314]
        exclude:
          - manylinux-image: manylinux2014
            python-tag: cp314

    env:
      IMAGE: quay.io/pypa/${{ matrix.manylinux-image }}_x86_64
      PYBIN: /opt/python/${{ matrix.python-tag }}-${{ matrix.python-tag }}/bin

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build wheel in manylinux container
        shell: bash
        run: |
          docker run --rm \
            -e PYBIN="${PYBIN}" \
            -v "${PWD}:/project" \
            -w /project \
            "${IMAGE}" \
            bash -lc '
              set -euxo pipefail
              test -x "${PYBIN}/python"
              "${PYBIN}/python" -m pip install --upgrade pip
              "${PYBIN}/python" -m pip install build xarray
              rm -rf dist build
              "${PYBIN}/python" -m build --wheel
            '
          sudo chown -R "$(id -u):$(id -g)" dist build

      - name: Verify wheel contents
        shell: bash
        run: |
          python3 - <<'PY'
          import pathlib
          import zipfile

          wheel = next(pathlib.Path('dist').glob('*.whl'))
          with zipfile.ZipFile(wheel) as zf:
              names = set(zf.namelist())
          required = {
              'skytropd/tutorial.py',
              'skytropd/ValidationData/va.nc',
              'skytropd/ValidationMetrics/EDJ.nc',
          }
          missing = sorted(required - names)
          if missing:
              raise SystemExit(f'Missing files in wheel: {missing}')
          print(f'Verified wheel: {wheel.name}')
          PY

      - name: Install wheel and run smoke tests in container
        shell: bash
        run: |
          docker run --rm \
            -e PYBIN="${PYBIN}" \
            -v "${PWD}:/project" \
            -w /project \
            "${IMAGE}" \
            bash -lc '
              set -euxo pipefail
              test -x "${PYBIN}/python"
              "${PYBIN}/python" -m pip install --force-reinstall dist/*.whl xarray
              cd /tmp
              "${PYBIN}/python" - <<"PY"
              import pathlib
              import numpy as np
              import skytropd as pyt
              import skytropd.tutorial as tutorial

              package_dir = pathlib.Path(pyt.__file__).resolve().parent
              assert (package_dir / "ValidationData" / "va.nc").exists()
              assert (package_dir / "ValidationMetrics" / "EDJ.nc").exists()
              assert tutorial.V.shape == (tutorial.lat.size, tutorial.lev.size)
              phi = pyt.TropD_Calculate_MaxLat(
                  np.sin(2.0 * np.radians(np.array([10.0, 20.0, 30.0, 40.0, 50.0]))),
                  np.array([10.0, 20.0, 30.0, 40.0, 50.0]),
              )
              assert np.isfinite(phi)
              print(package_dir)
              print(phi)
              PY
            '