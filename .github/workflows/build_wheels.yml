name: Build Wheels

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish built artifacts to PyPI"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CIBW_BUILD_VERBOSITY: "1"
  CIBW_SKIP: "*-musllinux* *-win32"
  CIBW_TEST_COMMAND: "python {project}/testing/smoke_wheel.py"

jobs:
  build_linux:
    name: Linux ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: manylinux2014-x86_64
            image: manylinux2014
            artifact_name: wheels-linux-manylinux2014-x86_64
            build_selector: >-
              cp39-manylinux_x86_64
              cp310-manylinux_x86_64
              cp311-manylinux_x86_64
              cp312-manylinux_x86_64
              cp313-manylinux_x86_64
          - label: manylinux_2_28-x86_64
            image: manylinux_2_28
            artifact_name: wheels-linux-manylinux_2_28-x86_64
            build_selector: >-
              cp39-manylinux_x86_64
              cp310-manylinux_x86_64
              cp311-manylinux_x86_64
              cp312-manylinux_x86_64
              cp313-manylinux_x86_64
              cp314-manylinux_x86_64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel==3.4.0

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: ${{ matrix.build_selector }}
          CIBW_MANYLINUX_X86_64_IMAGE: ${{ matrix.image }}
          CIBW_ENVIRONMENT_LINUX: >-
            CC=gcc
            FC=gfortran
            F77=gfortran
            F90=gfortran
            PIP_PREFER_BINARY=1
            PIP_ONLY_BINARY=numpy,scipy

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: wheelhouse/*.whl

  build_macos:
    name: macOS ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: x86_64
            os: macos-15-intel
            artifact_name: wheels-macos-x86_64
            build_selector: >-
              cp39-macosx_x86_64
              cp310-macosx_x86_64
              cp311-macosx_x86_64
              cp312-macosx_x86_64
              cp313-macosx_x86_64
              cp314-macosx_x86_64
          - label: arm64
            os: macos-14
            artifact_name: wheels-macos-arm64
            build_selector: >-
              cp39-macosx_arm64
              cp310-macosx_arm64
              cp311-macosx_arm64
              cp312-macosx_arm64
              cp313-macosx_arm64
              cp314-macosx_arm64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install macOS toolchain
        shell: bash
        run: |
          set -euxo pipefail
          export HOMEBREW_NO_AUTO_UPDATE=1
          brew list gcc >/dev/null 2>&1 || brew install gcc
          GCC_PREFIX="$(brew --prefix gcc)"
          GCC_BIN_DIR="${GCC_PREFIX}/bin"
          C_BIN="$(compgen -G "${GCC_BIN_DIR}/gcc-[0-9]*" | sort -V | tail -1)"
          F_BIN="$(compgen -G "${GCC_BIN_DIR}/gfortran-[0-9]*" | sort -V | tail -1)"
          test -n "${C_BIN}"
          test -n "${F_BIN}"
          echo "${GCC_BIN_DIR}" >> "$GITHUB_PATH"
          echo "MACOS_CC=${C_BIN}" >> "$GITHUB_ENV"
          echo "MACOS_FC=${F_BIN}" >> "$GITHUB_ENV"

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel==3.4.0

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: ${{ matrix.build_selector }}
          CIBW_ENVIRONMENT_MACOS: >-
            CC=${{ env.MACOS_CC }}
            FC=${{ env.MACOS_FC }}
            F77=${{ env.MACOS_FC }}
            F90=${{ env.MACOS_FC }}
            PIP_PREFER_BINARY=1
            PIP_ONLY_BINARY=numpy,scipy

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: wheelhouse/*.whl

  build_windows:
    name: Windows x86_64
    runs-on: windows-2022
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v6

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gcc-fortran

      - name: Add MinGW toolchain to PATH
        shell: pwsh
        run: |
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\msys64\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel==3.4.0

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CC: C:\msys64\mingw64\bin\gcc.exe
          FC: C:\msys64\mingw64\bin\gfortran.exe
          F77: C:\msys64\mingw64\bin\gfortran.exe
          F90: C:\msys64\mingw64\bin\gfortran.exe
          CIBW_BUILD: >-
            cp39-win_amd64
            cp310-win_amd64
            cp311-win_amd64
            cp312-win_amd64
            cp313-win_amd64
            cp314-win_amd64
          CIBW_ENVIRONMENT_WINDOWS: >-
            PIP_PREFER_BINARY=1
            PIP_ONLY_BINARY=numpy,scipy
          CIBW_BEFORE_BUILD_WINDOWS: "python -m pip install delvewheel"
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >-
            python -m delvewheel repair
            --add-path C:\msys64\mingw64\bin
            -w {dest_dir}
            {wheel}

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-x86_64
          path: wheelhouse/*.whl

  build_sdist:
    name: Source Distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build twine
          python -m build --sdist
          python -m twine check dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build_linux, build_macos, build_windows, build_sdist]
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.publish)
    runs-on: ubuntu-latest
    environment:
      name: pypi

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
